<!-- AJUSTES PRINCIPAIS:
1. Visual mais próximo da identidade da M&T (neon purple + mint)
2. Hero mais forte visualmente
3. Glow gradient no fundo
4. Cards mais premium
5. Hover mais moderno
6. Melhor responsividade
7. Melhor hierarquia visual
8. Destaque maior para CTA
-->

<style>
*,*::before,*::after{
  box-sizing:border-box;
  margin:0;
  padding:0
}

:root{
  --bg:#07080d;
  --bg2:#0c1018;
  --card:#10141d;
  --card2:#151b26;

  --text:#eef2ff;
  --sub:#93a0b8;
  --sub2:#64748b;

  --border:rgba(255,255,255,0.08);
  --border2:rgba(255,255,255,0.15);

  /* M&T COLORS */
  --purple:#7c3aed;
  --purple-light:#a855f7;
  --mint:#2df7c1;
  --blue:#4f7cff;
  --pink:#ff4fd8;

  --purple-bg:rgba(124,58,237,.12);
  --mint-bg:rgba(45,247,193,.12);
  --blue-bg:rgba(79,124,255,.12);

  --gradient:
  linear-gradient(
    135deg,
    #7c3aed 0%,
    #4f7cff 45%,
    #2df7c1 100%
  );
}

html{
  scroll-behavior:smooth
}

body{
  font-family:'Inter',sans-serif;
  background:
    radial-gradient(circle at top left, rgba(124,58,237,.16), transparent 32%),
    radial-gradient(circle at top right, rgba(45,247,193,.10), transparent 28%),
    radial-gradient(circle at bottom center, rgba(79,124,255,.12), transparent 35%),
    var(--bg);

  color:var(--text);
  overflow-x:hidden;
  line-height:1.7;
  font-size:14px;
}

/* GLOW FX */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
  linear-gradient(
    90deg,
    transparent,
    rgba(124,58,237,.02),
    transparent
  );
  pointer-events:none;
  z-index:-1;
}

/* NAV */
nav{
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:100;

  height:60px;

  display:flex;
  align-items:center;
  justify-content:space-between;

  padding:0 2rem;

  background:rgba(7,8,13,.82);
  backdrop-filter:blur(18px);

  border-bottom:1px solid rgba(255,255,255,.06);
}

.logo{
  font-family:'IBM Plex Mono',monospace;
  font-size:14px;
  color:white;
  letter-spacing:.04em;
}

.logo b{
  color:var(--mint);
}

.nav-links{
  display:flex;
  align-items:center;
  gap:2rem;
}

.nav-links a{
  font-size:12px;
  color:var(--sub);
  text-decoration:none;
  transition:.2s;
  font-family:'IBM Plex Mono',monospace;
  letter-spacing:.05em;
}

.nav-links a:hover{
  color:var(--mint);
}

.dot-green{
  display:inline-flex;
  align-items:center;
  gap:6px;

  font-family:'IBM Plex Mono',monospace;
  font-size:11px;

  color:var(--mint);
}

.dot-green::before{
  content:'';
  width:7px;
  height:7px;
  border-radius:50%;
  background:var(--mint);

  box-shadow:
  0 0 12px var(--mint),
  0 0 20px var(--mint);

  animation:blink 2.5s infinite;
}

@keyframes blink{
  0%,100%{opacity:1}
  50%{opacity:.35}
}

.w{
  max-width:1120px;
  margin:0 auto;
  padding:0 1.5rem;
}

/* HERO */
#hero{
  position:relative;
  padding:140px 0 90px;
  overflow:hidden;
}

#hero::before{
  content:'';
  position:absolute;
  width:700px;
  height:700px;

  background:
  radial-gradient(circle, rgba(124,58,237,.18), transparent 70%);

  top:-300px;
  right:-200px;

  z-index:-1;
}

.hero-grid{
  display:grid;
  grid-template-columns:1fr 320px;
  gap:4rem;
  align-items:center;
}

.hero-top{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:1.8rem;
}

.badge{
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;

  padding:5px 10px;
  border-radius:999px;

  letter-spacing:.06em;
  border:1px solid transparent;
}

.b-green{
  background:var(--mint-bg);
  color:var(--mint);
  border-color:rgba(45,247,193,.22);
}

.b-blue{
  background:var(--blue-bg);
  color:var(--blue);
  border-color:rgba(79,124,255,.22);
}

.b-purple{
  background:var(--purple-bg);
  color:#b88cff;
  border-color:rgba(124,58,237,.22);
}

.b-dim{
  background:rgba(255,255,255,.04);
  color:var(--sub);
  border-color:var(--border);
}

h1{
  font-size:clamp(3rem,7vw,5.5rem);
  line-height:.95;
  letter-spacing:-.06em;
  margin-bottom:1rem;

  font-weight:800;

  color:white;
}

.hero-subtitle{
  font-family:'IBM Plex Mono',monospace;
  font-size:14px;
  color:#b7c2d9;

  margin-bottom:1.6rem;
}

.hero-subtitle b{
  color:var(--mint);
}

.hero-bio{
  max-width:720px;
  color:var(--sub);

  font-size:15px;
  line-height:1.85;

  margin-bottom:2rem;
}

.hero-bio strong{
  color:white;
  font-weight:600;
}

/* BUTTONS */
.btns{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
}

.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;

  min-height:48px;

  padding:0 24px;

  border-radius:12px;

  text-decoration:none;

  transition:.22s ease;

  font-size:14px;
  font-weight:600;

  border:1px solid transparent;
}

.btn-p{
  background:var(--gradient);
  color:#05070d;

  box-shadow:
  0 10px 35px rgba(124,58,237,.35);
}

.btn-p:hover{
  transform:translateY(-2px);
  box-shadow:
  0 18px 50px rgba(124,58,237,.45);
}

.btn-o{
  background:rgba(255,255,255,.03);
  border-color:rgba(255,255,255,.08);
  color:white;
}

.btn-o:hover{
  border-color:rgba(45,247,193,.35);
  color:var(--mint);

  background:rgba(45,247,193,.05);
}

/* CARD */
.avail-card{
  position:relative;

  background:
  linear-gradient(
    180deg,
    rgba(255,255,255,.04),
    rgba(255,255,255,.02)
  );

  border:1px solid rgba(255,255,255,.08);

  border-radius:24px;

  padding:1.5rem;

  backdrop-filter:blur(12px);

  overflow:hidden;
}

.avail-card::before{
  content:'';
  position:absolute;
  inset:0;

  background:
  linear-gradient(
    140deg,
    rgba(124,58,237,.14),
    transparent 35%,
    rgba(45,247,193,.05)
  );

  pointer-events:none;
}

.ac-head{
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;

  color:var(--mint);

  display:flex;
  align-items:center;
  gap:8px;

  margin-bottom:1rem;
  padding-bottom:1rem;

  border-bottom:1px solid rgba(255,255,255,.06);

  letter-spacing:.08em;
  text-transform:uppercase;
}

.ac-head::before{
  content:'';
  width:8px;
  height:8px;
  border-radius:50%;

  background:var(--mint);

  box-shadow:
  0 0 10px var(--mint),
  0 0 18px var(--mint);
}

.ac-row{
  display:flex;
  justify-content:space-between;
  gap:1rem;

  margin-bottom:.85rem;
}

.ac-l{
  color:var(--sub2);
  font-size:11px;

  font-family:'IBM Plex Mono',monospace;
}

.ac-v{
  color:white;
  font-size:13px;
  font-weight:600;
}

.ac-v.g{
  color:var(--mint);
}

/* NUMBERS */
.numbers{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:18px;

  margin-top:10px;
  padding:0 1.5rem 3rem;

  max-width:1120px;
  margin-inline:auto;
}

.num-item{
  background:
  linear-gradient(
    180deg,
    rgba(255,255,255,.04),
    rgba(255,255,255,.02)
  );

  border:1px solid rgba(255,255,255,.08);

  border-radius:18px;

  padding:2rem 1rem;

  text-align:center;

  transition:.2s;
}

.num-item:hover{
  transform:translateY(-4px);
  border-color:rgba(124,58,237,.25);
}

.num-n{
  font-size:2.2rem;
  font-weight:800;
  letter-spacing:-.06em;
}

.num-l{
  margin-top:.6rem;

  font-size:11px;
  color:var(--sub);

  font-family:'IBM Plex Mono',monospace;
}

/* SECTION */
section{
  position:relative;
}

.sec-label{
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;

  color:var(--mint);

  letter-spacing:.16em;
  text-transform:uppercase;

  margin-bottom:.5rem;
}

.sec-title{
  font-size:2rem;
  font-weight:800;

  letter-spacing:-.04em;

  margin-bottom:2rem;
}

/* STACK */
#stack,
#projetos,
#experiencia,
#contato{
  padding:5rem 0;
}

.stack-table{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:16px;
}

.st-row{
  background:
  linear-gradient(
    180deg,
    rgba(255,255,255,.04),
    rgba(255,255,255,.02)
  );

  border:1px solid rgba(255,255,255,.08);

  border-radius:18px;

  padding:1.2rem;

  transition:.2s;
}

.st-row:hover{
  transform:translateY(-4px);
  border-color:rgba(124,58,237,.22);
}

.st-cat{
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;

  color:var(--mint);

  letter-spacing:.12em;
  text-transform:uppercase;

  margin-bottom:1rem;
}

.st-items{
  display:flex;
  flex-wrap:wrap;
  gap:7px;
}

.st-item{
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;

  padding:5px 9px;
  border-radius:999px;
}

/* PROJ */
.proj-list{
  display:flex;
  flex-direction:column;
  gap:18px;
}

.proj{
  background:
  linear-gradient(
    180deg,
    rgba(255,255,255,.04),
    rgba(255,255,255,.02)
  );

  border:1px solid rgba(255,255,255,.08);

  border-radius:24px;

  padding:2rem;

  transition:.22s;
}

.proj:hover{
  transform:translateY(-5px);
  border-color:rgba(124,58,237,.25);

  box-shadow:
  0 20px 40px rgba(0,0,0,.25);
}

.proj-name{
  font-size:18px;
  font-weight:700;
}

.proj-what{
  margin-top:1rem;
  color:var(--sub);
}

.proj-what strong{
  color:white;
}

.proj-tech{
  margin-top:1rem;
  display:flex;
  flex-wrap:wrap;
  gap:7px;
}

.tc{
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;

  padding:5px 8px;
  border-radius:999px;

  background:rgba(255,255,255,.04);

  border:1px solid rgba(255,255,255,.08);

  color:#c0cae0;
}

/* EXPERIENCE */
.exp{
  padding:2rem 0;
  border-bottom:1px solid rgba(255,255,255,.06);
}

.exp-role{
  font-size:18px;
  font-weight:700;
}

.exp-co{
  margin-top:.3rem;
  color:var(--sub);
}

.exp-buls{
  margin-top:1.2rem;
}

.bul{
  color:var(--sub);
  margin-bottom:.7rem;
}

.bul strong{
  color:white;
}

/* CONTACT */
.contact-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:4rem;
}

.ct-title{
  font-size:3rem;
  line-height:1;
  letter-spacing:-.06em;
  margin-bottom:1rem;
}

.ct-title span{
  background:var(--gradient);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.links{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.cl{
  display:flex;
  align-items:center;
  gap:14px;

  background:
  linear-gradient(
    180deg,
    rgba(255,255,255,.04),
    rgba(255,255,255,.02)
  );

  border:1px solid rgba(255,255,255,.08);

  border-radius:16px;

  padding:14px 16px;

  text-decoration:none;

  transition:.2s;
}

.cl:hover{
  transform:translateX(6px);
  border-color:rgba(45,247,193,.25);
}

.cl-ico{
  width:42px;
  height:42px;

  border-radius:12px;

  display:flex;
  align-items:center;
  justify-content:center;

  font-family:'IBM Plex Mono',monospace;
  font-size:11px;
  font-weight:700;
}

.ci-g{
  background:var(--mint-bg);
  color:var(--mint);
}

.ci-b{
  background:var(--blue-bg);
  color:var(--blue);
}

.ci-p{
  background:var(--purple-bg);
  color:#c084fc;
}

.cl-lbl{
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;

  color:var(--sub2);
}

.cl-val{
  color:white;
  margin-top:2px;
}

/* FOOTER */
footer{
  padding:2rem;
  text-align:center;

  border-top:1px solid rgba(255,255,255,.06);

  color:var(--sub2);

  font-family:'IBM Plex Mono',monospace;
  font-size:11px;
}

/* MOBILE */
@media(max-width:900px){

  .hero-grid,
  .contact-grid{
    grid-template-columns:1fr;
  }

  .avail-card{
    max-width:100%;
  }

  .numbers{
    grid-template-columns:repeat(2,1fr);
  }

  h1{
    font-size:3.4rem;
  }
}

@media(max-width:640px){

  nav{
    padding:0 1rem;
  }

  .nav-links a{
    display:none;
  }

  .numbers{
    grid-template-columns:1fr;
  }

  h1{
    font-size:2.7rem;
  }

  .ct-title{
    font-size:2.2rem;
  }

  .btn{
    width:100%;
  }

  .btns{
    flex-direction:column;
  }
}
</style>
